apiVersion: v1
kind: Service
metadata:
  name: mk2-auth
spec:
  selector:
    app: mk2-auth
  ports:
    - name: http
      port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk2-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mk2-auth
  template:
    metadata:
      labels:
        app: mk2-auth
    spec:
      containers:
        - name: auth
          image: personal-operating-system-mk2-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mk2-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: mk2-secret
                  key: REDIS_URL
            - name: REDIS_KEY_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: REDIS_KEY_PREFIX
            - name: AUTH_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: AUTH_SERVICE_PORT
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: CORS_ORIGIN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mk2-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: JWT_EXPIRES_IN
            - name: THROTTLE_GLOBAL_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: THROTTLE_GLOBAL_LIMIT
            - name: THROTTLE_GLOBAL_TTL_SEC
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: THROTTLE_GLOBAL_TTL_SEC
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
