apiVersion: v1
kind: Service
metadata:
  name: mk2-web
spec:
  selector:
    app: mk2-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk2-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mk2-web
  template:
    metadata:
      labels:
        app: mk2-web
    spec:
      containers:
        - name: web
          image: personal-operating-system-mk2-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: BACKEND_URL
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: AUTH_SERVICE_URL
            - name: NOTES_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: NOTES_SERVICE_URL
            - name: MK3_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: MK3_SERVICE_URL
            - name: MK3_SCRAPER_REFRESH_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: MK3_SCRAPER_REFRESH_ENABLED
            - name: DEMO_EMAIL
              valueFrom:
                secretKeyRef:
                  name: mk2-secret
                  key: DEMO_EMAIL
            - name: DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mk2-secret
                  key: DEMO_PASSWORD
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
